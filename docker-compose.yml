services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: securegate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  smtp4dev:
    image: rnwood/smtp4dev:latest
    ports:
      - "5000:80"
      - "2525:25"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=securegate;Username=postgres;Password=postgres"
      Jwt__Secret: "dev-only-secret-do-not-use-in-production-change-me-1234567890"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Smtp__Host: "smtp4dev"
      Smtp__Port: "25"
      Smtp__From: "noreply@securegate.dev"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      smtp4dev:
        condition: service_started

volumes:
  postgres-data:
