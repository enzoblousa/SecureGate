<mat-card class="auth-card">
  <mat-card-header>
    <mat-card-title>Entrar</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>E-mail</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <mat-error>Informe um e-mail válido.</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput formControlName="password" type="password" autocomplete="current-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <mat-error>Senha deve ter no mínimo 8 caracteres.</mat-error>
        }
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="submitting" class="full-width">
        Entrar
      </button>
    </form>
  </mat-card-content>

  <mat-card-actions>
    <a routerLink="/register">Não tem conta? Cadastre-se</a>
  </mat-card-actions>
</mat-card>
